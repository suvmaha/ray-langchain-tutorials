name: langchain-hello-agent
entrypoint: python agent.py
image_uri: anyscale/ray:2.44.0-py311
runtime_env:
  pip:
    - langchain
    - langchain-anthropic
    - langchain-core
compute_config:
  head_node:
    required_resources:
      CPU: 4
      memory: 8Gi
  worker_nodes:
    - required_resources:
        CPU: 2
        memory: 4Gi
      min_nodes: 1
      max_nodes: 3
working_dir: .
max_retries: 1
