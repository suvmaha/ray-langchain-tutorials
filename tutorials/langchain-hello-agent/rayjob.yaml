apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: langchain-hello-agent
  namespace: default
spec:
  entrypoint: python /home/ray/tutorial/agent.py
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 600

  runtimeEnvYAML: |
    pip:
      - langchain-anthropic
      - langgraph

  rayClusterSpec:
    rayVersion: "2.44.0"

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.44.0-py311
              resources:
                requests:
                  cpu: "2"
                  memory: "4Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: langchain-secrets
                      key: ANTHROPIC_API_KEY
              volumeMounts:
                - mountPath: /home/ray/tutorial
                  name: tutorial-code
          volumes:
            - name: tutorial-code
              configMap:
                name: langchain-hello-agent-code

    workerGroupSpecs:
      - groupName: worker-group
        replicas: 3
        minReplicas: 1
        maxReplicas: 3
        rayStartParams: {}
        template:
          spec:
            containers:
              - name: ray-worker
                image: rayproject/ray:2.44.0-py311
                resources:
                  requests:
                    cpu: "2"
                    memory: "4Gi"
                  limits:
                    cpu: "2"
                    memory: "4Gi"
                env:
                  - name: ANTHROPIC_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: langchain-secrets
                        key: ANTHROPIC_API_KEY
